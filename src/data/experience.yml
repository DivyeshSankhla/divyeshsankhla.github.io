- company: University at Buffalo
  location: Buffalo, NY
  role: Research Assistant
  start: Oct. 2025
  end: Apr. 2026
  logo: /images/logos/ub.svg
  projectSummaries:
    - title: Lean4 Formal Verification for Algorithm Analysis
      summary: >
        A research program at UB to formalize algorithm analysis for teaching and
        research. I developed Lean4 and Mathlib libraries and correctness proofs for
        asymptotic notation, recurrences, and classic algorithm families including
        divide-and-conquer, dynamic programming, and greedy methods, so verified
        results can be reused instead of rebuilt each term.

- company: eInfochips
