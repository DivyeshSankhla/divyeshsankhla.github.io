  logo: /images/logos/einfochips.png
  relatedProjects:
    - linux-ip-camera-firmware
    - edge-to-cloud-video
  projectSummaries:
    - title: IP Camera Firmware & Edge-to-Cloud Platform
      summary: >
        Production embedded Linux firmware for IP cameras across multiple SKUs. I joined
        an in-flight program and grew into platform work spanning the device server, fleet
        OTA for over a thousand deployed units, and a refactor that unified three product
        lines into one multi-sensor codebase, then led the edge stack connecting those
        cameras to cloud apps for live view, secure recording with outage buffering,
        fleet configuration, and on-camera event delivery.

