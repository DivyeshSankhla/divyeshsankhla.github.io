- company: University at Buffalo
  location: Buffalo, NY
  role: Research Assistant
  start: Oct. 2025
  end: Apr. 2026
  logo: /images/logos/ub.svg
  projectSummaries:
    - title: Lean4 Formal Verification for Algorithm Analysis
      summary: >
        A research program at UB to formalize algorithm analysis for teaching and
        research. I develop Lean4 and Mathlib libraries and correctness proofs for
        asymptotic notation, recurrences, and classic algorithm families including
        divide-and-conquer, dynamic programming, and greedy methods, so verified
        results can be reused instead of rebuilt each term.

- company: eInfochips
  location: Ahmedabad, India
  role: Embedded Software Engineer
  start: Aug. 2021
  end: Dec. 2024
  logo: /images/logos/einfochips.png
  relatedProjects:
    - webrtc-streaming
    - ota-firmware
    - cloud-video-recorder
    - onvif-platform
    - multi-sensor-refactor
  projectSummaries:
    - title: Linux IP Camera Firmware Platform
      summary: >
        Production embedded Linux firmware for IP cameras across multiple SKUs. I joined
        an in-flight program and grew into platform work spanning the device server,
        live streaming, fleet updates for over a thousand deployed units, and a refactor
        that unified three product lines into one multi-sensor codebase, along with
        fixing bugs across the live system.
    - title: Edge-to-Cloud Video Platform
      summary: >
        A follow-on program connecting those cameras to cloud applications for live view,
        recording, fleet configuration, and event delivery. I led the edge streaming
        and recording stack end to end, from stabilizing live view before a critical
        release through multi-viewer support, secure cloud recording with outage
        buffering, and on-camera event delivery for downstream search.

