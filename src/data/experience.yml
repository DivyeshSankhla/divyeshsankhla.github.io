      - Refactored large C/C++ legacy firmware modules, consolidating XML/JSON parsers (cJSON/libxml2) and improving maintainability across a 7-person team.
      - "Awards: Power Trainee Award (2022), Best Team Award (2024), Pat on the Back Award (Duclo)."

  - company: Krossmark Innovations
