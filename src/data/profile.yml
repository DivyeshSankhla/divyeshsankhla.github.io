about:
  - >
    Hello there, and thanks for stopping by. I work on embedded Linux where software
    actually meets hardware: tracing a board from early boot through to a stable
    userspace, shaping how peripherals show up to applications, and keeping
    protocol-heavy services honest when the network is messy.
  - >
    At eInfochips I spent three years on production IP camera firmware. That covered
    multithreaded C/C++ services, fleet OTA with rollback across 1,000+ deployed
    devices, and live paths over ONVIF, RTSP, and WebRTC. When a stream glitched or
    a socket misbehaved, I was usually in gdb, dmesg, or a Wireshark trace before
    trusting another log line.
  - >
    I'm at the University at Buffalo now (MS CSE), filling in the theory side through
    operating systems coursework and formal verification research. On my own time I've
    also been climbing down the stack: following reset-to-kernel boot in QEMU, building
    Linux drivers that wire peripherals into userspace, working through scheduling and
    syscalls in the Pintos kernel, and getting Zephyr threads and ISRs to cooperate
    without surprises. The sections below cover both shipped production work and that
    systems-level practice. Happy to talk if any of it lines up with what you're building.
