- name: Embedded & Firmware Projects
  projects:
    - slug: linux-ip-camera-firmware
      title: Linux IP Camera Firmware Platform
      org: eInfochips
      tier: featured
      tech:
        - C
        - C++
        - Embedded Linux
        - POSIX threads
        - TCP/IP
        - UDP
        - HTTP/HTTPS
        - WebSockets
        - ONVIF G/S/T
        - gSOAP
        - Lighttpd
        - REST/SOAP
        - TLS
        - OpenSSL
        - digest auth
        - SQLite3
        - JSON (cJSON)
        - XML (libxml2)
        - A/B partitioning
      focuses:
        - title: ONVIF & Device APIs
          highlights:
            - Enhanced 15+ ONVIF/WebSocket APIs backed by low-level device services including recording manager, network manager, and live stream manager that feed state into ONVIF responses.
            - Debugged TCP CLOSE_WAIT socket buildup under sustained NVR sessions by tracing connection teardown and lifecycle handling in the service layer.
            - Scaled SQLite3-backed user data to 1M+ records using WAL mode and tuned indices.
        - title: Fleet OTA
          highlights:
            - Designed staged downloads, checksum validation, version gating, and post-update health checks.
            - Added A/B slot switching with automated rollback and durable audit logs for rollout visibility.
        - title: Multi-Sensor Architecture
          highlights:
            - Refactored settings, database access, and API routing around per-sensor indices instead of hard-coded series logic.

    - slug: edge-to-cloud-video
      title: Edge-to-Cloud Video Platform
      org: eInfochips
      tier: featured
      tech:
        - C
        - C++
        - Embedded Linux
        - POSIX threads
        - epoll/select
        - TCP/IP
        - UDP
        - NAT
        - STUN/TURN
        - HTTP/HTTPS
        - WebSockets
        - RTSP/RTSPS
        - Live555
        - WebRTC
        - libdatachannel
        - RTP
        - H.264
        - FFmpeg
        - TLS
        - OpenSSL
        - digest auth
        - MQTT
        - Mosquitto
        - JSON (cJSON)
        - XML (libxml2)
      focuses:
        - title: WebRTC Live View
          highlights:
            - Fixed FU-A fragmentation logic traced with Wireshark, cutting decoder frame drops to zero before an investor demo.
            - Replaced global streaming state with per-client sessions and tuned jitter buffers for lossy WAN paths.
        - title: Cloud Video Recorder
          highlights:
            - Built RTSPS push with encrypted transport, event-based recording, and a 30-second local fallback during WAN outages.
            - Collaborated with the cloud team on protocol, security, and timestamp handling for CVR ingest.
        - title: MQTT Fleet Configuration
          highlights:
            - Centralized validated device settings over MQTT across 4+ SKUs with transactional rollback on failure.
            - Added schema validation and synchronized state updates to prevent partial misconfiguration applies.
        - title: Event Intelligence
          highlights:
            - Normalized motion and analytics events on-camera and published structured JSON payloads for cloud search.
            - Built a lightweight XML-to-JSON path with filtering and keepalive tuning for downstream indexing.

- name: Systems & OS Projects
  projects:
    - slug: pintos-kernel
      title: Pintos Operating System Kernel
      org: University at Buffalo
      summary: >
        Extended the Pintos teaching kernel with scheduling, synchronization, and user-program
        support grounded in real concurrency pitfalls.
      tier: academic
      tech:
        - C
        - Operating Systems
        - Scheduling
        - Synchronization
      highlights:
        - Implemented alarm clock, priority donation, and 4.4BSD-style MLFQS scheduling.
        - Built system calls, ELF loading, file I/O, exec/wait, and safe user-memory access paths.

    - slug: linux-drivers
      title: Linux Kernel and Driver Development
      org: Personal
      summary: >
        Built and debugged character and platform drivers to connect userspace tooling with
        kernel interrupt and memory concepts.
      tier: academic
      tech:
        - C
        - Linux Kernel
        - Device Tree
        - QEMU
        - ioctl
      highlights:
        - Developed /dev interfaces with ioctl, poll/select, IRQ handling, deferred work, and wait queues.
        - Strengthened driver concepts around DMA, IOVA, IOMMU, cache coherency, and module lifecycle debugging.

    - slug: uboot-bringup
      title: U-Boot Bootloader Bring-Up
      org: Personal
      summary: >
        Traced and customized the reset-to-kernel path in QEMU to make early boot failures
        diagnosable instead of opaque.
      tier: academic
      tech:
        - C
        - U-Boot
        - QEMU
        - Device Tree
      highlights:
        - Added a custom board command, tuned bootargs, and staged kernel/Device Tree/initrd images.
        - Documented memory layout and handoff behavior using bdinfo and boot logs.

    - slug: zephyr-rtos
      title: Zephyr RTOS Firmware and Drivers
      org: Personal
      summary: >
        Prototyped multithreaded Zephyr firmware with GPIO/I2C drivers and ISR-safe deferred
        processing patterns.
      tier: academic
      tech:
        - C
        - Zephyr RTOS
        - Device Tree
        - GPIO
        - I2C
      highlights:
        - Used DEVICE_DT_DEFINE bindings with priority-based scheduling and timing analysis.
        - Measured interrupt-to-deferred-work latency and basic sleep/wakeup power behavior.

- name: Robotics Projects
  projects:
    - slug: auv
      title: Autonomous Underwater Vehicle
      org: Nirma University
      summary: >
        Led software for a university AUV with ROS perception on Jetson TX2, microcontroller-linked
        sensors, and thruster control under underwater lighting and timing constraints.
      tier: other
      tech:
        - ROS
        - OpenCV
        - CUDA
        - Jetson TX2
        - PID
      highlights:
        - Built a ROS perception pipeline with OpenCV color/shape detection, morphological filtering, and contour analysis tuned for variable underwater lighting.
        - Linked camera, IMU, and pressure sensing through a microcontroller to Jetson TX2; CUDA-accelerated image filters to keep thruster PID loops running in real time with failsafe states on sensor dropouts.

    - slug: drone-navigation
      title: Drone Navigation with On-Board CV
      org: Nirma University
      summary: >
        Built a Raspberry Pi navigation stack that closed the loop from frames to roll/pitch
        stabilization in real time.
      tier: other
      tech:
        - ROS
        - OpenCV
        - Python
        - Raspberry Pi
        - PID
      highlights:
        - Tuned PID loops and safety interlocks for image-based heading control on constrained hardware.

