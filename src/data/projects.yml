- name: Algorithm Analysis & Formal Verification Projects
  projects:
    - slug: lean4-research
      title: Lean4 Theorem Proving & Formal Verification
      org: University at Buffalo
      summary: >
        Interactive theorem proving in Lean4: formalizing algorithm correctness with machine-checked
        proofs rather than pen-and-paper arguments, building reusable Mathlib libraries for teaching
        and research.
      tier: other
      tech:
        - Lean4
        - Mathlib
        - Dependent Types
        - Theorem Proving
        - Formal Verification
      highlights:
        - Formalized divide-and-conquer, dynamic-programming, and greedy algorithm families with correctness proofs and recurrence reasoning.
        - Built reusable libraries for asymptotic notation and classic algorithms including Merge Sort and dynamic-programming staples.

