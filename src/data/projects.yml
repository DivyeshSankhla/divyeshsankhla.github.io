- name: Embedded & Firmware Projects
  projects:
    - slug: webrtc-streaming
      title: Low-Latency WebRTC Streaming
      org: eInfochips
      context: Investor demo at risk after corrupted H.264 frames on multi-client live view
      summary: >
        Rebuilt RTP packetization and session handling so one camera could serve multiple
        WebRTC viewers reliably under time pressure.
      tier: featured
      tech:
        - WebRTC
        - RTP
        - H.264
        - Live555
        - libdatachannel
        - STUN/TURN
      highlights:
        - Reduced decoder frame drops to zero after fixing FU-A fragmentation logic traced with Wireshark.
        - Replaced global streaming state with per-client sessions for concurrent live viewers.
        - Tuned jitter buffers and RTP pacing for stable playback over lossy WAN paths.

    - slug: ota-firmware
      title: Fleet OTA Firmware Infrastructure
      org: eInfochips
      context: Field cameras needed safe, recoverable updates across a growing deployed fleet
      summary: >
        Shipped staged OTA with verification and rollback so 1,000+ production cameras could
        update without bricking.
      tier: featured
      tech:
        - C
        - C++
        - Embedded Linux
        - SQLite3
        - A/B partitions
      highlights:
        - Designed staged downloads, checksum validation, version gating, and post-update health checks.
        - Added A/B partition switching and automated rollback on failed updates.
        - Upgraded SQLite3 schemas and durable audit logs for fleet-wide rollout visibility.

    - slug: cloud-video-recorder
      title: Cloud Video Recorder
      org: eInfochips
      context: Cloud recording had to survive WAN blips without losing security-sensitive events
      summary: >
        Built RTSPS push from edge to cloud with encrypted transport, local buffering, and
        entitlement-aware access across product lines.
      tier: featured
      tech:
        - C++
        - RTSPS
        - TLS
        - MQTT
        - OpenSSL
      highlights:
        - Engineered event-based recording with pre/post buffers and a 30-second local fallback during outages.
        - Collaborated with the cloud team on protocol, security, and timestamp handling for CVR ingest.
        - Integrated MQTT-based fleet configuration and RBAC-style entitlements across 5+ feature domains.

    - slug: onvif-platform
      title: ONVIF Camera Platform
      org: eInfochips
      context: Third-party NVRs exposed edge-case API failures during certification cycles
      summary: >
        Hardened ONVIF G/S/T services and device APIs so 5+ camera SKUs interoperated cleanly
        with major NVR/VMS suites.
      tier: featured
      tech:
        - C
        - C++
        - gSOAP
        - Lighttpd
        - SQLite3
        - ONVIF
      highlights:
        - Enhanced 15+ ONVIF/WebSocket APIs with POSIX-threaded request handling and NVR integration fixes.
        - Scaled SQLite3-backed user and entitlement data to 1M+ records using WAL mode and tuned indices.
        - Consolidated XML/JSON utilities to cut config-related defects across a 7-person firmware team.

    - slug: multi-sensor-refactor
      title: Multi-Sensor Camera Architecture
      org: eInfochips
      context: Three camera series had diverged codepaths that slowed every new SKU integration
      summary: >
        Merged multi-series firmware into a shared, sensor-indexed architecture that made new
        models faster to ship and easier to maintain.
      tier: featured
      tech:
        - C
        - C++
        - SQLite3
        - Embedded Linux
      highlights:
        - Refactored settings, database access, and API routing around per-sensor indices instead of hard-coded series logic.
        - Completed a major port on an aggressive timeline.

    - slug: mqtt-config
      title: MQTT Fleet Configuration
      org: eInfochips
      summary: >
        Centralized device settings over MQTT so cloud apps could push validated configuration
        to 4+ SKUs with transactional rollback on failure.
      tier: production
      tech:
        - MQTT
        - Mosquitto
        - C
        - C++
        - JSON
      highlights:
        - Added schema validation, persistent storage, and synchronized state updates across product lines.
        - Reduced misconfiguration incidents by making failed applies atomic rather than partial.

    - slug: event-intelligence
      title: Event Intelligence Pipeline
      org: eInfochips
      summary: >
        Normalized motion and analytics events on-camera and published structured payloads for
        downstream cloud search and NLP-based event discovery.
      tier: production
      tech:
        - C
        - C++
        - JSON
        - XML
        - MQTT
      highlights:
        - Built a lightweight XML-to-JSON path and subscriber model with filtering and keepalive tuning.
        - Enabled cloud teams to index device events without re-parsing legacy XML at scale.

- name: Systems & OS Projects
  projects:
    - slug: pintos-kernel
      title: Pintos Operating System Kernel
      org: University at Buffalo
      summary: >
        Extended the Pintos teaching kernel with scheduling, synchronization, and user-program
        support grounded in real concurrency pitfalls.
      tier: academic
      tech:
        - C
        - Operating Systems
        - Scheduling
        - Synchronization
      highlights:
        - Implemented alarm clock, priority donation, and 4.4BSD-style MLFQS scheduling.
        - Built system calls, ELF loading, file I/O, exec/wait, and safe user-memory access paths.

    - slug: linux-drivers
      title: Linux Kernel and Driver Development
      org: Personal
      summary: >
        Built and debugged character and platform drivers to connect userspace tooling with
        kernel interrupt and memory concepts.
      tier: academic
      tech:
        - C
        - Linux Kernel
        - Device Tree
        - QEMU
        - ioctl
      highlights:
        - Developed /dev interfaces with ioctl, poll/select, IRQ handling, deferred work, and wait queues.
        - Strengthened driver concepts around DMA, IOVA, IOMMU, cache coherency, and module lifecycle debugging.

    - slug: uboot-bringup
      title: U-Boot Bootloader Bring-Up
      org: Personal
      summary: >
        Traced and customized the reset-to-kernel path in QEMU to make early boot failures
        diagnosable instead of opaque.
      tier: academic
      tech:
        - C
        - U-Boot
        - QEMU
        - Device Tree
      highlights:
        - Added a custom board command, tuned bootargs, and staged kernel/Device Tree/initrd images.
        - Documented memory layout and handoff behavior using bdinfo and boot logs.

    - slug: zephyr-rtos
      title: Zephyr RTOS Firmware and Drivers
      org: Personal
      summary: >
        Prototyped multithreaded Zephyr firmware with GPIO/I2C drivers and ISR-safe deferred
        processing patterns.
      tier: academic
      tech:
        - C
        - Zephyr RTOS
        - Device Tree
        - GPIO
        - I2C
      highlights:
        - Used DEVICE_DT_DEFINE bindings with priority-based scheduling and timing analysis.
        - Measured interrupt-to-deferred-work latency and basic sleep/wakeup power behavior.

- name: Robotics Projects
  projects:
    - slug: auv
      title: Autonomous Underwater Vehicle
      org: Nirma University
      summary: >
        Led software for a university AUV with ROS perception, Jetson TX2 compute, and thruster
        control under real underwater constraints.
      tier: other
      tech:
        - ROS
        - OpenCV
        - CUDA
        - Jetson TX2
        - PID
      highlights:
        - Achieved ~90% vision detection accuracy and up to ~15× CUDA speedup on representative frames.
        - Integrated camera, IMU, and pressure sensing with failsafe states for bench-tank missions.

    - slug: drone-navigation
      title: Drone Navigation with On-Board CV
      org: Nirma University
      summary: >
        Built a Raspberry Pi navigation stack that closed the loop from frames to roll/pitch
        stabilization in real time.
      tier: other
      tech:
        - ROS
        - OpenCV
        - Python
        - Raspberry Pi
        - PID
      highlights:
        - Tuned PID loops and safety interlocks for image-based heading control on constrained hardware.

- name: Data & ML Projects
  projects:
    - slug: digital-wellbeing
      title: Digital Well-Being Data Analysis
      org: University at Buffalo
      summary: >
        Explored how screen-time patterns relate to sleep and health signals across 300K+
        digital-wellness records.
      tier: other
      tech:
        - Python
        - pandas
        - scikit-learn
        - XGBoost
      highlights:
        - Modeled outcomes with ensemble and clustering methods; physical exercise moderated several negative correlations.

    - slug: lean4-research
      title: Lean4 Formal Verification
      org: University at Buffalo
      summary: >
        Formalized algorithm correctness proofs in Lean4 for divide-and-conquer,
        dynamic-programming, and greedy algorithms, turning recurrence-heavy arguments
        into reusable Mathlib libraries.
      tier: other
      tech:
        - Lean4
        - Mathlib
        - Formal Verification
      highlights:
        - Covered divide-and-conquer algorithms, Masters Theorem framing, and proofs for Merge Sort and dynamic-programming classics.

- name: Hardware Projects
  projects:
    - slug: digital-design
      title: Digital Design Projects
      org: Nirma University
      summary: >
        Early hardware projects spanning a 16-bit RISC core, FIFO memory, and a doorway
        person-counter prototype.
      tier: other
      tech:
        - Verilog
        - Quartus
        - Embedded C
        - IR sensors
      highlights:
        - Designed ISA, datapath, and control for a 16-bit processor with test-bench validation.
        - Built parameterized FIFO blocks and a two-sensor entry/exit counter with debounce logic.
